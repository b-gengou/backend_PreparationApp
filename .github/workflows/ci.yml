# Pipeline d'intégration continue (CI) pour le backend PreparationApp.
# Exigé par le cahier des charges : section 4.1 (contraintes techniques)
# et section 9 (livrables - "Code source versionné... pipeline CI/CD").
# Ce pipeline compile le projet principal & !!!  exécute les tests automatisés
# (PreparationApp.Backend.Tests) à chaque push ou pull request sur main.

name: CI Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer le SDK .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurer les dépendances NuGet
        run: dotnet restore PreparationApp.Backend/PreparationApp.Backend.csproj

      - name: Compiler le projet
        run: dotnet build PreparationApp.Backend/PreparationApp.Backend.csproj --no-restore

      - name: Restaurer les dépendances du projet de tests
        run: dotnet restore PreparationApp.Backend.Tests/PreparationApp.Backend.Tests.csproj

      - name: Lancer les tests automatisés
        run: dotnet test PreparationApp.Backend.Tests/PreparationApp.Backend.Tests.csproj --no-restore